name: Build snapshot version and upload to Maven Central

on:
  push:
    branches: [ "main" ]

permissions: {}

jobs:
    call-snapshot-job:
      uses: project-ncl/shared-github-actions/.github/workflows/maven-snapshot.yml@f7041589cc1ce5e75564bda958cc6e5182c240cd # v0.0.15
      with:
        project_name: 'project-ncl/dingrogu'
      secrets:
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        QUAY_DEVEL_USERNAME: ${{ secrets.QUAY_DEVEL_USERNAME }}
        QUAY_DEVEL_PASSWORD: ${{ secrets.QUAY_DEVEL_PASSWORD }}
